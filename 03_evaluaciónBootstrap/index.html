<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - Epic Games</title>
    <meta name="author" content="mauricioflores@liceovvh.cl">
    <link rel="stylesheet" href="static/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- BootStrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <nav class="navbar navbar-expand-md sm-body-tertiary bg-black">
        <div class="container-fluid">
            <img src="static/img/epic-games-logo.png" alt="EpicGames_Logo">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link text-light mx-3" aria-current="page" href="#"><strong>Tienda</strong></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-light mx-3" href="#"><strong>Noticias</strong></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-light mx-3" href="#"><strong>Preguntas frecuentes</strong></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-light mx-3" href="#"><strong>ayuda</strong></a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-light" href="#" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            <strong>Acerca de Epic Games</strong>
                        </a>
                        <ul class="dropdown-menu bg-dark">
                            <li><a class="dropdown-item text-light my-2 mx-1" href="#">Compañía</a></li>
                            <li><a class="dropdown-item text-light my-2 mx-1" href="#">Epic Newsroom</a></li>
                            <li><a class="dropdown-item text-light my-2 mx-1" href="#">La vida en Epic</a></li>
                            <li><a class="dropdown-item text-light my-2 mx-1" href="#">Empleos</a></li>
                            <li><a class="dropdown-item text-light my-2 mx-1" href="#">Estudiantes</a></li>
                        </ul>
                    </li>
                </ul>
                <i id="globe" class="bi bi-globe mx-3 text-light"></i>
                <button id="iniciarSesion" class="btn m-2 p-1 px-3" type="submit"><strong>Iniciar
                        Sesion</strong></button>
                <button class="btn btn-info mx-2 p-1 px-3" type="submit">Descargar</button>
            </div>
        </div>
    </nav>
    <main>
        <div id="miCarouselDoble" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <div class="row">
                        <div class="col-md-6"> <img src="static/img/rocket_league.jpg" class="d-block w-100" alt="..."> </div>
                        <div class="col-md-6"> <img src="static/img/epic-games-logo.png" class="d-block w-100" alt="..."> </div>
                    </div>
                </div>
                <div class="carousel-item">
                    <div class="row">
                        <div class="col-md-6"> <img src="imagen3.jpg" class="d-block w-100" alt="..."> </div>
                        <div class="col-md-6"> <img src="imagen4.jpg" class="d-block w-100" alt="..."> </div>
                    </div>
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#miCarouselDoble" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#miCarouselDoble" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>

    </main>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
